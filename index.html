<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DeepRead</title>
  <link rel="icon" href="data:," />
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(180deg, #f4f0ff 0%, #f0f4ff 100%);
      min-height: 100vh;
      padding: 20px 16px 32px;
      display: flex;
      justify-content: center;
    }
    .app {
      max-width: 600px;
      width: 100%;
    }
    .header {
      text-align: center;
      padding: 16px 0 24px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 0.5px;
    }
    .header .sub {
      font-size: 13px;
      color: #98a2b3;
      margin-top: 2px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #344054;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e4e7ec;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.6;
      color: #1d2939;
      background: #fafbfc;
      resize: none;
      transition: border-color 0.2s, background 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #7c5cfc;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
    }
    textarea:read-only {
      background: #f8f9fc;
    }
    textarea::placeholder { color: #98a2b3; }
    .row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .row textarea { flex: 1; }
    .btn {
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn-sm {
      padding: 10px 16px;
      background: #f0ecff;
      color: #7c5cfc;
    }
    .btn-sm:hover { background: #e4ddff; }
    .btn-sm:active { transform: scale(0.96); }
    .btn-primary {
      width: 100%;
      padding: 14px 0;
      background: #7c5cfc;
      color: #fff;
      font-size: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(124,92,252,0.25);
    }
    .btn-primary:hover { background: #6948f0; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .ai-section { display: none; }
    .card-title-row { display: flex; justify-content: space-between; align-items: center; }
    .capsule-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .capsule {
      padding: 8px 16px;
      border: 1.5px solid #d0d5dd;
      border-radius: 999px;
      background: #fff;
      color: #344054;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .capsule:hover {
      border-color: #7c5cfc;
      color: #7c5cfc;
      background: #f5f0ff;
    }
    .capsule:active { transform: scale(0.96); }
    .thinking-area { margin-top: 16px; }
    .thinking-area textarea { min-height: 140px; }
    .bottom { margin-top: 4px; display: flex; gap: 10px; }
    .bottom .btn-primary,
    .bottom .btn-outline { flex: 1; }
    .btn-outline {
      padding: 14px 0;
      background: #fff;
      color: #7c5cfc;
      border: 1.5px solid #7c5cfc;
      font-size: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(124,92,252,0.12);
    }
    .btn-outline:hover { background: #f5f0ff; transform: translateY(-1px); }
    .btn-outline:active { transform: scale(0.98); }
    .btn-paste {
      width: 100%;
      padding: 12px 0;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1.5px solid #66bb6a;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-paste:hover { background: #c8e6c9; }
    .btn-paste:active { transform: scale(0.98); }
    .btn-evaluate {
      width: 100%;
      padding: 12px 0;
      margin-top: 12px;
      background: #fff4e5;
      color: #b76e00;
      border: 1.5px solid #e6a23c;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-evaluate:hover { background: #fdf0d5; }
    .btn-evaluate:active { transform: scale(0.98); }
    .chat-window {
      display: none;
      margin-top: 14px;
      border: 1px solid #e4e7ec;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .chat-messages {
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .chat-msg.assistant {
      background: #f5f0ff;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.user {
      background: #7c5cfc;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-input-area {
      display: none;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #e4e7ec;
      align-items: center;
      flex-wrap: wrap;
    }
    .chat-input {
      flex: 1;
      min-width: 140px;
      padding: 10px 14px;
      border: 1.5px solid #e4e7ec;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }
    .chat-input:focus { border-color: #7c5cfc; }
    .chat-summary {
      display: none;
      margin-top: 12px;
      padding: 16px 18px;
      background: #f0fdf4;
      border-left: 4px solid #22c55e;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.7;
      color: #166534;
      white-space: pre-wrap;
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal-content {
      background: #fff;
      border-radius: 16px;
      padding: 24px 20px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-header h2 { font-size: 18px; color: #1a1a2e; }
    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #98a2b3;
      padding: 0 4px;
    }
    .modal-close:hover { color: #344054; }
    .modal-item {
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f5;
    }
    .modal-item:last-child { border-bottom: none; }
    .modal-item .meta { font-size: 12px; color: #98a2b3; margin-bottom: 4px; }
    .modal-item .excerpt { font-size: 13px; color: #7c5cfc; margin-bottom: 4px; }
    .modal-item .thought { font-size: 14px; color: #344054; }
    .final-summary-area {
      display: none;
      margin-top: 12px;
      padding: 16px 18px;
      background: #eef2ff;
      border-left: 4px solid #6366f1;
      border-radius: 10px;
    }
    .final-summary-area .label { font-size: 13px; font-weight: 600; color: #4338ca; margin-bottom: 8px; }
    .final-summary-area .body { font-size: 14px; line-height: 1.7; color: #1e1b4b; white-space: pre-wrap; }
    .final-summary-area .btn { margin-top: 10px; }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .library-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #f0f0f5;
    }
    .library-card .badge {
      font-size: 11px;
      color: #7c5cfc;
      background: #f0ecff;
      padding: 2px 8px;
      border-radius: 999px;
      align-self: flex-start;
    }
    .library-card .preview {
      font-size: 13px;
      color: #344054;
      line-height: 1.5;
    }
    .library-card .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }
    .library-card .card-actions .btn {
      flex: 1;
      padding: 6px 0;
      font-size: 12px;
      border-radius: 8px;
    }
    .library-card.recycled {
      background: #f3f4f6;
      border-color: #d1d5db;
    }
    .library-card.recycled .badge {
      background: #e5e7eb;
      color: #6b7280;
    }
    .share-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 400px;
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .share-card .s-header { font-family: Georgia, 'Times New Roman', serif; font-size: 14px; color: #7c5cfc; text-align: center; margin-bottom: 20px; }
    .share-card .s-quote { font-family: 'Courier New', monospace; font-size: 16px; line-height: 1.8; color: #1d2939; padding: 16px 0; border-top: 1px solid #e4e7ec; border-bottom: 1px solid #e4e7ec; margin-bottom: 16px; white-space: pre-wrap; }
    .share-card .s-quote::before { content: '「'; color: #7c5cfc; font-size: 24px; }
    .share-card .s-quote::after { content: '」'; color: #7c5cfc; font-size: 24px; }
    .share-card .s-body { font-size: 14px; color: #344054; line-height: 1.7; margin-bottom: 12px; white-space: pre-wrap; }
    .share-card .s-footer { font-size: 11px; color: #98a2b3; text-align: center; border-top: 1px solid #f0f0f5; padding-top: 12px; }
    .share-options { display: flex; gap: 8px; margin-top: 12px; }
    .share-options .btn { flex: 1; padding: 10px 0; font-size: 13px; }
    .detail-section { margin-bottom: 16px; }
    .detail-section .label { font-size: 13px; font-weight: 600; color: #344054; margin-bottom: 6px; }
    .detail-section .value {
      font-size: 14px;
      line-height: 1.7;
      color: #1d2939;
      background: #f9fafb;
      padding: 12px 14px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
    @media (max-width: 440px) {
      .card-grid { grid-template-columns: 1fr; }
    }
    .undo-toast {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1d2939;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      align-items: center;
      gap: 12px;
      z-index: 2000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .undo-toast .btn-sm {
      background: #7c5cfc;
      color: #fff;
      padding: 6px 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>DeepRead</h1>
      <div class="sub">记录你的阅读灵感</div>
    </div>

    <div class="card">
      <div class="card-title">📖 上下文接收区</div>
      <div class="row">
        <textarea id="receiveArea" rows="3" readonly placeholder="等待接收微信读书分享的原文..."></textarea>
        <button class="btn btn-sm" id="btnSimulate">模拟接收</button>
      </div>
      <button class="btn btn-paste" id="btnPaste" style="margin-top:8px;">📋 粘贴并思考</button>
    </div>

    <div class="card ai-section" id="aiSection">
      <div class="card-title card-title-row">
        <span>🤖 AI 引导思考</span>
        <button class="btn btn-sm" id="btnRefresh" style="font-size:12px;padding:4px 10px;display:none;">🔄 刷新换一批</button>
      </div>
      <div class="capsule-bar" id="capsuleBar"></div>
    </div>

    <div class="card thinking-area">
      <div class="card-title">✏️ 我的思考区</div>
      <textarea id="thoughtArea" placeholder="顺着上面的思路，或者自由记录..."></textarea>
      <button class="btn btn-evaluate" id="btnEvaluate">✍️ 请 AI 点评我的思考</button>
      <div class="chat-window" id="chatWindow">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area" id="chatInputArea">
          <input type="text" class="chat-input" id="chatReplyInput" placeholder="输入你的追问或反驳...">
          <button class="btn btn-sm" id="chatSendBtn">发送</button>
          <button class="btn btn-sm" id="chatEndBtn" style="background:#fee2e2;color:#991b1b;">🛑 结束探讨并总结</button>
  <div class="modal-overlay" id="shareModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📤 分享卡片</h2>
        <button class="modal-close" id="shareClose">&times;</button>
      </div>
      <div id="shareBody"></div>
      <div class="share-options">
        <button class="btn btn-sm" id="shareAsImage">🖼️ 保存图片</button>
        <button class="btn btn-sm" id="shareAsMd">📄 导出 .md</button>
        <button class="btn btn-sm" id="shareAsText">📋 复制文本</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📄 卡片详情</h2>
        <button class="modal-close" id="detailClose">&times;</button>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>
      </div>
      <div class="chat-summary" id="chatSummary"></div>
      <div class="final-summary-area" id="finalSummaryArea">
        <div class="label">📄 学术总结报告</div>
        <div class="body" id="summaryBody"></div>
        <button class="btn btn-sm" id="btnSaveSummary">📋 复制总结并存入卡片</button>
      </div>
    </div>

    <div class="bottom">
      <button class="btn btn-primary" id="btnSave">💾 保存至卡片库</button>
      <button class="btn btn-outline" id="btnExport">📥 导出笔记</button>
      <button class="btn btn-outline" id="btnLibrary">📖 卡片库</button>
    </div>
  </div>

  <div class="modal-overlay" id="libraryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📖 我的卡片库</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="undo-toast" id="undoToast">
    <span>卡片已移入回收站</span>
    <button class="btn btn-sm" id="undoBtn">↩️ 撤销</button>
  </div>

  <div class="modal-overlay" id="exportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📤 导出格式选择</h2>
        <button class="modal-close" id="exportClose">&times;</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-primary" id="exportTxt">📄 纯文本 (.txt)</button>
        <button class="btn btn-outline" id="exportMd">📝 标准 Markdown (.md)</button>
        <button class="btn btn-outline" id="exportDoc">📘 Word 文档 (.doc)</button>
        <button class="btn btn-outline" id="exportJson">💾 数据备份 (.json)</button>
      </div>
    </div>
  </div>
  <script>
    if (navigator.serviceWorker) {
      navigator.serviceWorker.register('./sw.js')
    }

    const API_KEY = 'sk-FL4bw67mtkAFIsj9OjyccSZzFyiIgXWKaypcCy3pHkPAhvLG'
    const MODEL_NAME = 'gpt-4o-mini'
    const API_URL = location.protocol === 'file:'
      ? 'https://api.chatanywhere.tech/v1/chat/completions'
      : '/api/proxy'

    function getWhitelist() {
      try { return JSON.parse(localStorage.getItem('whitelist') || '[]') } catch { return [] }
    }

    const receiveArea = document.getElementById('receiveArea')
    const thoughtArea = document.getElementById('thoughtArea')
    const aiSection = document.getElementById('aiSection')
    const capsuleBar = document.getElementById('capsuleBar')
    const btnSimulate = document.getElementById('btnSimulate')
    const btnRefresh = document.getElementById('btnRefresh')

    const FAKE_TEXT = '他看着那扇紧闭的门，手心渗出了汗水，最终还是把钥匙放回了口袋。'
    const TEST_WHITELIST = ['李寻欢', '飞刀']

    async function fetchAIQuestions(text, whitelist) {
      const systemPrompt = '你是一位拥有海量阅读经验的资深文学评论家与顶级小说编辑。你的任务是敏锐地洞察读者提供的小说片段，并提出 3 个极具启发性、能引发深度思考的问题。提问切入点建议涵盖：人物深层心理与动机的张力、环境/细节描写的隐喻与潜台词、或是叙事结构上的伏笔与构式作用。问题要简短犀利，拒绝泛泛而谈。【强制约束】：必须严格基于传入的【专有名词白名单】进行提问，绝不允许在提问中编造、虚构白名单之外的人名、地名或任何专有设定。请必须严格返回一个 JSON 数组，包含3个字符串，不要输出任何多余的 Markdown 标记或解释文字。'

      const userPrompt = '原文：' + text + '\n专有名词白名单：' + (whitelist.length ? whitelist.join('、') : '无')

      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
        body: JSON.stringify({
          model: MODEL_NAME,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt },
          ],
          temperature: 0.7,
        }),
      })

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}: ${await res.text()}`)
      }

      const data = await res.json()
      const responseText = data.choices[0].message.content
      const match = responseText.match(/\[[\s\S]*\]/)
      if (!match) throw new Error('无法解析 AI 返回的格式')
      return JSON.parse(match[0])
    }

    async function loadAIQuestions(text) {
      const whitelist = getWhitelist()
      btnRefresh.textContent = '思考中...'
      btnRefresh.disabled = true

      try {
        const questions = await fetchAIQuestions(text, whitelist)
        capsuleBar.innerHTML = questions.map(q =>
          `<span class="capsule" data-text="${q.replace(/"/g, '&quot;')}">${q}</span>`
        ).join('')
        aiSection.style.display = 'block'
        btnRefresh.style.display = ''
      } catch (err) {
        alert('生成问题失败: ' + err.message)
      } finally {
        btnRefresh.textContent = '🔄 刷新换一批'
        btnRefresh.disabled = false
      }
    }

    async function receiveText(text) {
      receiveArea.value = text
      btnSimulate.textContent = 'AI 思考中...'
      btnSimulate.disabled = true

      await loadAIQuestions(text)

      btnSimulate.textContent = '模拟接收'
      btnSimulate.disabled = false
    }

    btnSimulate.onclick = () => receiveText(FAKE_TEXT)

    document.getElementById('btnPaste').onclick = () => {
      const area = document.getElementById('receiveArea')
      area.readOnly = false
      area.value = ''
      area.placeholder = '👆 长按此处选择「粘贴」'
      area.focus()
      area.addEventListener('paste', function auto() {
        setTimeout(() => {
          const val = area.value.trim()
          if (val) {
            area.readOnly = true
            area.placeholder = '等待接收微信读书分享的原文...'
            loadAIQuestions(val)
          }
        }, 50)
        area.removeEventListener('paste', auto)
      }, { once: true })
    }

    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search)
      const sharedText = params.get('share_text')
      if (sharedText) {
        receiveText(sharedText)
      }
    })

    capsuleBar.addEventListener('click', (e) => {
      const capsule = e.target.closest('.capsule')
      if (!capsule) return
      thoughtArea.value = capsule.dataset.text
      thoughtArea.focus()
    })

    function downloadFile(content, fileName, mimeType) {
      const blob = new Blob([content], { type: mimeType + ';charset=utf-8' })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url
      a.download = fileName
      a.style.display = 'none'
      document.body.appendChild(a)
      a.click()
      document.body.removeChild(a)
      URL.revokeObjectURL(url)
    }

    function buildNotesMarkdown() {
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      if (!notes.length) { alert('当前没有可导出的笔记'); return null }
      const lines = ['# 我的全部阅读思考笔记', '']
      for (const n of notes) {
        lines.push('---')
        lines.push(`### ${n.date}`)
        lines.push(`> **原文高亮**：${n.text}`)
        lines.push('')
        lines.push(`**我的思考**：${n.thought}`)
        if (n.summary) { lines.push(''); lines.push(`**AI 总结**：${n.summary}`) }
        lines.push('')
      }
      lines.push('---')
      lines.push(`> *笔记导出时间：${new Date().toLocaleString()}*`)
      return lines.join('\n')
    }

    function mdToPlainText(md) {
      return md
        .replace(/^### /gm, '')
        .replace(/^# /gm, '')
        .replace(/^> /gm, '')
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\* (.+)/g, '- $1')
        .replace(/---/g, '————————')
        .replace(/\n{3,}/g, '\n\n')
    }

    function exportTxt() {
      const md = buildNotesMarkdown()
      if (!md) return
      downloadFile(mdToPlainText(md), '我的阅读笔记.txt', 'text/plain')
      closeExport()
    }

    function exportMd() {
      const md = buildNotesMarkdown()
      if (!md) return
      downloadFile(md, '我的阅读笔记.md', 'text/markdown')
      closeExport()
    }

    function exportDoc() {
      const md = buildNotesMarkdown()
      if (!md) return
      const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>阅读笔记</title></head><body>' +
        md.replace(/\n/g, '<br>').replace(/### (.+)/g, '<h3>$1</h3>').replace(/# (.+)/g, '<h1>$1</h1>')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/^> (.+)/gm, '<blockquote>$1</blockquote>') +
        '</body></html>'
      downloadFile(html, '我的阅读笔记.doc', 'application/msword')
      closeExport()
    }

    function exportJson() {
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      const bin = JSON.parse(localStorage.getItem('recycle_bin') || '[]')
      const data = { exportedAt: new Date().toISOString(), reading_notes: notes, recycle_bin: bin }
      if (!notes.length && !bin.length) { alert('没有数据可导出'); return }
      downloadFile(JSON.stringify(data, null, 2), '阅读笔记备份.json', 'application/json')
      closeExport()
    }

    function closeExport() {
      document.getElementById('exportModal').classList.remove('open')
    }

    document.getElementById('btnExport').onclick = () => {
      document.getElementById('exportModal').classList.add('open')
    }

    document.getElementById('exportClose').onclick = closeExport
    document.getElementById('exportModal').onclick = (e) => {
      if (e.target === e.currentTarget) closeExport()
    }
    document.getElementById('exportTxt').onclick = exportTxt
    document.getElementById('exportMd').onclick = exportMd
    document.getElementById('exportDoc').onclick = exportDoc
    document.getElementById('exportJson').onclick = exportJson

    document.getElementById('btnSave').onclick = () => {
      const text = receiveArea.value.trim()
      const thought = thoughtArea.value.trim()
      if (!text) { alert('请先接收原文'); return }
      if (!thought) { alert('请写下你的思考'); return }
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      notes.push({ date: new Date().toLocaleString(), text, thought })
      localStorage.setItem('reading_notes', JSON.stringify(notes))
      alert('保存成功')
      receiveArea.value = ''
      thoughtArea.value = ''
      aiSection.style.display = 'none'
      capsuleBar.innerHTML = ''
    }

    btnRefresh.onclick = () => {
      const text = receiveArea.value.trim()
      if (!text) { alert('请先通过粘贴或模拟接收填入原文'); return }
      loadAIQuestions(text)
    }

    let currentChatHistory = []

    async function callChatAPI(messages) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
        body: JSON.stringify({ model: MODEL_NAME, messages, temperature: 0.7 }),
      })
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`)
      const data = await res.json()
      return data.choices[0].message.content
    }

    function renderMessage(content, role, container) {
      const div = document.createElement('div')
      div.className = 'chat-msg ' + role
      div.textContent = content
      container.appendChild(div)
      container.scrollTop = container.scrollHeight
    }

    document.getElementById('btnEvaluate').onclick = async () => {
      const originalText = document.getElementById('receiveArea').value.trim()
      const userThought = document.getElementById('thoughtArea').value.trim()
      if (!userThought) { alert('请先输入思考内容'); return }
      if (!originalText) { alert('请先接收原文'); return }

      const btn = document.getElementById('btnEvaluate')
      const chatWindow = document.getElementById('chatWindow')
      const chatMessages = document.getElementById('chatMessages')
      const chatInputArea = document.getElementById('chatInputArea')
      const summaryDiv = document.getElementById('chatSummary')

      chatMessages.innerHTML = ''
      summaryDiv.style.display = 'none'
      summaryDiv.innerHTML = ''
      chatWindow.style.display = 'block'
      chatInputArea.style.display = 'none'
      btn.disabled = true
      btn.textContent = '老编辑审稿中...'

      const whitelist = getWhitelist()
      const s = '【强制安全约束】必须严格遵守专有名词白名单，禁止虚构名单之外的人名、地名或设定。'
      const systemPrompt = '你是一位拥有极高文学素养的资深文学评论家。现在，读者提供了一段小说原文和他写下的个人思考。你需要对读者的思考进行专业的【点评与升华】。\n\n开始前先做简单判断：如果读者提供的内容少于3个字或是无规律乱码，请温和提示他认真输入。否则，结合原文进行深度文学点评。\n\n请按以下结构输出：\n\n闪光点：肯定读者思考中敏锐、独特的切入点。\n\n升华建议：以引导性的语言，提出可以进一步深挖的文学维度（如动机潜台词、叙事视角张力、特定词汇隐喻等）。\n语气要像一位亦师亦友的资深书友。\n' + s
      const userPrompt = '小说原文：' + originalText + '\n\n读者的思考：' + userThought + '\n\n专有名词白名单：' + (whitelist.length ? whitelist.join('、') : '无')

      currentChatHistory = [
        { role: 'system', content: systemPrompt },
        { role: 'user', content: userPrompt },
      ]

      try {
        const reply = await callChatAPI(currentChatHistory)
        currentChatHistory.push({ role: 'assistant', content: reply })
        renderMessage(reply, 'assistant', chatMessages)
        document.getElementById('chatReplyInput').value = ''
        chatInputArea.style.display = 'flex'
      } catch (err) {
        alert('AI 点评失败：' + err.message)
      } finally {
        btn.textContent = '✍️ 请 AI 点评我的思考'
        btn.disabled = false
      }
    }

    document.getElementById('chatSendBtn').onclick = async () => {
      const input = document.getElementById('chatReplyInput')
      const text = input.value.trim()
      if (!text) return
      input.value = ''

      const chatMessages = document.getElementById('chatMessages')
      const chatInputArea = document.getElementById('chatInputArea')

      currentChatHistory.push({ role: 'user', content: text })
      renderMessage(text, 'user', chatMessages)
      chatInputArea.style.display = 'none'

      try {
        const reply = await callChatAPI(currentChatHistory)
        currentChatHistory.push({ role: 'assistant', content: reply })
        renderMessage(reply, 'assistant', chatMessages)
      } catch (err) {
        alert('回复失败：' + err.message)
      } finally {
        chatInputArea.style.display = 'flex'
      }
    }

    document.getElementById('chatEndBtn').onclick = async () => {
      const chatMessages = document.getElementById('chatMessages')
      const chatInputArea = document.getElementById('chatInputArea')

      chatInputArea.style.display = 'none'
      const loading = document.createElement('div')
      loading.style.cssText = 'text-align:center;padding:12px;color:#98a2b3;font-size:13px;'
      loading.textContent = '⏳ 正在生成学术总结...'
      chatMessages.appendChild(loading)

      currentChatHistory.push({
        role: 'system',
        content: '请根据以上所有的探讨内容，用学术、严谨的语言，提取核心观点与升华洞察，输出为一段结构清晰的 Markdown 总结报告。',
      })

      try {
        const summary = await callChatAPI(currentChatHistory)
        chatMessages.removeChild(loading)
        document.getElementById('summaryBody').textContent = summary
        document.getElementById('finalSummaryArea').style.display = 'block'
        window._lastSummary = summary
        window._lastOriginalText = document.getElementById('receiveArea').value.trim()
        window._lastThought = document.getElementById('thoughtArea').value.trim()
      } catch (err) {
        chatMessages.removeChild(loading)
        alert('总结失败：' + err.message)
      }
    }

    document.getElementById('chatReplyInput').onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('chatSendBtn').click() }
    }

    document.getElementById('btnSaveSummary').onclick = () => {
      const text = window._lastOriginalText || document.getElementById('receiveArea').value.trim()
      const thought = window._lastThought || document.getElementById('thoughtArea').value.trim()
      const summary = window._lastSummary || ''
      if (!text || !thought) { alert('缺少原文或思考内容'); return }
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      notes.push({ date: new Date().toLocaleString(), text, thought, summary })
      localStorage.setItem('reading_notes', JSON.stringify(notes))
      alert('✅ 卡片已保存（含学术总结）')
    }

    function showCardDetails(displayIdx) {
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      const realIdx = notes.length - 1 - displayIdx
      const note = notes[realIdx]
      if (!note) return
      document.getElementById('detailBody').innerHTML =
        '<div class="detail-section"><div class="label">📅 日期</div><div class="value">' + (note.date || '') + '</div></div>' +
        '<div class="detail-section"><div class="label">📖 原文</div><div class="value">' + (note.text || '') + '</div></div>' +
        '<div class="detail-section"><div class="label">✏️ 我的思考</div><div class="value">' + (note.thought || '') + '</div></div>' +
        (note.summary ? '<div class="detail-section"><div class="label">📄 AI 研讨总结</div><div class="value">' + note.summary + '</div></div>' : '')
      document.getElementById('detailModal').classList.add('open')
    }

    function openShareMenu(displayIdx) {
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      const realIdx = notes.length - 1 - displayIdx
      const note = notes[realIdx]
      if (!note) return
      window._shareNote = note
      document.getElementById('shareBody').innerHTML =
        '<div class="share-card" id="shareCardPreview">' +
        '<div class="s-header">DeepRead · 语料萃取</div>' +
        '<div class="s-quote">' + (note.text || '') + '</div>' +
        '<div class="s-body"><strong>我的思考：</strong>' + (note.thought || '') + '</div>' +
        (note.summary ? '<div class="s-body"><strong>AI 升华：</strong>' + note.summary + '</div>' : '') +
        '<div class="s-footer">' + (note.date || '') + ' · TCSOL 研究员手记</div></div>'
      document.getElementById('shareModal').classList.add('open')
    }

    function moveToRecycleBin(displayIdx) {
      if (!confirm('确定删除这条笔记吗？删除后可从回收站恢复。')) return
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      const realIdx = notes.length - 1 - displayIdx
      const card = notes.splice(realIdx, 1)[0]
      if (!card) return
      const bin = JSON.parse(localStorage.getItem('recycle_bin') || '[]')
      bin.push(card)
      localStorage.setItem('recycle_bin', JSON.stringify(bin))
      localStorage.setItem('reading_notes', JSON.stringify(notes))
      renderLibrary()
      const toast = document.getElementById('undoToast')
      toast.style.display = 'flex'
      window._undoCard = card
      clearTimeout(toast._timer)
      toast._timer = setTimeout(() => { toast.style.display = 'none' }, 6000)
    }

    document.getElementById('undoBtn').onclick = () => {
      const card = window._undoCard
      if (!card) return
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      notes.push(card)
      localStorage.setItem('reading_notes', JSON.stringify(notes))
      const bin = JSON.parse(localStorage.getItem('recycle_bin') || '[]')
      const idx = bin.findIndex(b => b.date === card.date && b.text === card.text)
      if (idx !== -1) bin.splice(idx, 1)
      localStorage.setItem('recycle_bin', JSON.stringify(bin))
      document.getElementById('undoToast').style.display = 'none'
      renderLibrary()
    }

    function restoreCard(binIdx) {
      const bin = JSON.parse(localStorage.getItem('recycle_bin') || '[]')
      const card = bin.splice(binIdx, 1)[0]
      if (!card) return
      const notes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      notes.push(card)
      localStorage.setItem('reading_notes', JSON.stringify(notes))
      localStorage.setItem('recycle_bin', JSON.stringify(bin))
      renderRecycleBin()
    }

    function permanentDeleteCard(binIdx) {
      if (!confirm('确定要永久删除这条笔记吗？此操作不可恢复！')) return
      if (!confirm('再次确认：这条笔记将被彻底删除。')) return
      const bin = JSON.parse(localStorage.getItem('recycle_bin') || '[]')
      bin.splice(binIdx, 1)
      localStorage.setItem('recycle_bin', JSON.stringify(bin))
      renderRecycleBin()
    }

    function renderLibrary() {
      const allNotes = JSON.parse(localStorage.getItem('reading_notes') || '[]')
      const body = document.getElementById('modalBody')
      if (!allNotes.length) {
        body.innerHTML = '<p style="color:#98a2b3;text-align:center;padding:24px 0;">卡片库空空如也</p>' +
          '<button class="btn btn-sm" id="goRecycleBtn" style="display:block;margin:0 auto;">🗑️ 查看回收站</button>'
        document.getElementById('goRecycleBtn').onclick = renderRecycleBin
        return
      }
      body.innerHTML = allNotes.slice().reverse().map((n, displayIdx) => {
        const excerpt = (n.text || '').length > 30 ? n.text.slice(0, 30) + '…' : (n.text || '')
        return '<div class="library-card">' +
          '<span class="badge">' + (n.date || '') + '</span>' +
          '<div class="preview">' + excerpt + '</div>' +
          '<div class="card-actions">' +
          '<button class="btn btn-sm action-btn btn-detail" data-index="' + displayIdx + '">🔍 详情</button>' +
          '<button class="btn btn-sm action-btn btn-share" data-index="' + displayIdx + '">📤 分享</button>' +
          '<button class="btn btn-sm action-btn btn-delete" data-index="' + displayIdx + '" style="background:#fee2e2;color:#991b1b;">🗑️ 删除</button>' +
          '</div></div>'
      }).join('') +
      '<button class="btn btn-sm" id="goRecycleBtn" style="display:block;margin:8px auto 0;">🗑️ 查看回收站</button>'
      document.getElementById('goRecycleBtn').onclick = renderRecycleBin
    }

    function renderRecycleBin() {
      const bin = JSON.parse(localStorage.getItem('recycle_bin') || '[]')
      const body = document.getElementById('modalBody')
      if (!bin.length) {
        body.innerHTML = '<p style="color:#98a2b3;text-align:center;padding:24px 0;">回收站是空的</p>' +
          '<button class="btn btn-sm" id="backToLibraryBtn" style="display:block;margin:0 auto;">📖 返回卡片库</button>'
        document.getElementById('backToLibraryBtn').onclick = renderLibrary
        return
      }
      body.innerHTML = '<div style="font-size:14px;font-weight:600;color:#6b7280;margin-bottom:12px;">🗑️ 回收站</div>' +
        '<div class="card-grid">' +
        bin.slice().reverse().map((n, i) => {
          const realIdx = bin.length - 1 - i
          const excerpt = (n.text || '').length > 30 ? n.text.slice(0, 30) + '…' : (n.text || '')
          return '<div class="library-card recycled">' +
            '<span class="badge">' + (n.date || '') + '</span>' +
            '<div class="preview">' + excerpt + '</div>' +
            '<div class="card-actions">' +
            '<button class="btn btn-sm action-btn btn-restore" data-index="' + realIdx + '">🔄 恢复</button>' +
            '<button class="btn btn-sm action-btn btn-permanent" data-index="' + realIdx + '" style="background:#fee2e2;color:#991b1b;">🔥 彻底删除</button>' +
            '</div></div>'
        }).join('') + '</div>' +
        '<button class="btn btn-sm" id="backToLibraryBtn" style="display:block;margin:12px auto 0;">📖 返回卡片库</button>'
      document.getElementById('backToLibraryBtn').onclick = renderLibrary
    }

    document.getElementById('btnLibrary').onclick = () => {
      renderLibrary()
      document.getElementById('libraryModal').classList.add('open')
    }

    document.getElementById('libraryModal').onclick = (e) => {
      if (e.target === e.currentTarget) document.getElementById('libraryModal').classList.remove('open')
    }
    document.getElementById('modalClose').onclick = () => {
      document.getElementById('libraryModal').classList.remove('open')
    }

    document.getElementById('modalBody').addEventListener('click', function(e) {
      const btn = e.target.closest('button.action-btn')
      if (!btn) return
      const idx = parseInt(btn.getAttribute('data-index'), 10)
      if (btn.classList.contains('btn-detail')) { showCardDetails(idx); return }
      if (btn.classList.contains('btn-share')) { openShareMenu(idx); return }
      if (btn.classList.contains('btn-delete')) { moveToRecycleBin(idx); return }
      if (btn.classList.contains('btn-restore')) { restoreCard(idx); return }
      if (btn.classList.contains('btn-permanent')) { permanentDeleteCard(idx); return }
    })

    /* Fix nested-modals issue: move shareModal & detailModal to top-level body */
    document.body.appendChild(document.getElementById('shareModal'))
    document.body.appendChild(document.getElementById('detailModal'))

    document.getElementById('shareClose').onclick = () => {
      document.getElementById('shareModal').classList.remove('open')
    }
    document.getElementById('shareModal').onclick = (e) => {
      if (e.target === e.currentTarget) document.getElementById('shareModal').classList.remove('open')
    }

    document.getElementById('detailClose').onclick = () => {
      document.getElementById('detailModal').classList.remove('open')
    }
    document.getElementById('detailModal').onclick = (e) => {
      if (e.target === e.currentTarget) document.getElementById('detailModal').classList.remove('open')
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'))
      }
    })

    document.getElementById('shareAsImage').onclick = async () => {
      const node = document.getElementById('shareCardPreview')
      if (!node || !window.html2canvas) { alert('图片生成库尚未加载，请稍后重试'); return }
      try {
        const canvas = await html2canvas(node, { scale: 2, backgroundColor: '#fff' })
        const link = document.createElement('a')
        link.download = '阅读卡片_' + new Date().toISOString().slice(0, 10) + '.png'
        link.href = canvas.toDataURL()
        link.click()
      } catch (e) { alert('生成图片失败: ' + e.message) }
    }

    document.getElementById('shareAsMd').onclick = () => {
      const n = window._shareNote
      if (!n) return
      const md = '# 阅读卡片\n\n📅 ' + (n.date || '') + '\n\n## 原文\n> ' + (n.text || '') + '\n\n## 我的思考\n' + (n.thought || '') + (n.summary ? '\n\n## AI 研讨总结\n' + n.summary : '') + '\n\n---\n*TCSOL 研究员手记 · ' + (n.date || '') + '*'
      const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' })
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '阅读卡片_' + new Date().toISOString().slice(0, 10) + '.md'; a.click()
      URL.revokeObjectURL(a.href)
    }

    document.getElementById('shareAsText').onclick = () => {
      const n = window._shareNote
      if (!n) return
      const text = '📖 阅读笔记\n\n📅 ' + (n.date || '') + '\n\n📖 原文：' + (n.text || '') + '\n\n✏️ 我的思考：' + (n.thought || '') + (n.summary ? '\n\n📄 AI 总结：' + n.summary : '')
      navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板')).catch(() => alert('复制失败'))
    }
  </script>
</body>
</html>
